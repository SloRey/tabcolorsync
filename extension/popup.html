<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 270px;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 16px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .title {
    font-size: 14px;
    font-weight: 600;
  }
  .switch {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #ccc;
    transition: .2s;
    border-radius: 22px;
  }
  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .2s;
    border-radius: 50%;
  }
  input:checked + .toggle-slider {
    background-color: #4285f4;
  }
  input:checked + .toggle-slider:before {
    transform: translateX(18px);
  }
  .status {
    margin-top: 10px;
    font-size: 12px;
    color: #666;
  }
  .preview-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0 10px;
  }
  .swatch {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid #ddd;
    flex-shrink: 0;
  }
  .swatch-labels {
    font-size: 11px;
    color: #888;
    line-height: 1.4;
  }
  .mode-tabs {
    display: flex;
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 4px;
  }
  .mode-tab {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
    font-size: 12px;
    cursor: pointer;
    background: #f7f7f7;
    color: #555;
  }
  .mode-tab.active {
    background: #4285f4;
    color: white;
    font-weight: 600;
  }
  .site-name {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .site-override-badge {
    font-size: 10px;
    color: #4285f4;
    text-align: center;
    margin-top: 2px;
  }
  .adjust-block {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #eee;
  }
  .browser-block {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #eee;
  }
  .browser-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .browser-label {
    font-size: 12px;
    color: #444;
  }
  select#browserSelect {
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: #f7f7f7;
  }
  .browser-status {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }
  .browser-status.warning {
    color: #d32f2f;
    font-weight: 600;
  }
  .adjust-row {
    margin-bottom: 10px;
  }
  .adjust-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #444;
    margin-bottom: 2px;
  }
  .adjust-value {
    font-variant-numeric: tabular-nums;
    color: #888;
  }
  input[type="range"] {
    width: 100%;
    margin: 0;
  }
  .btn-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .reset-btn {
    flex: 1;
    padding: 6px;
    font-size: 12px;
    border: 1px solid #ddd;
    background: #f7f7f7;
    border-radius: 6px;
    cursor: pointer;
  }
  .reset-btn:hover {
    background: #eee;
  }
</style>
</head>
<body>
  <div class="row">
    <span class="title">Tab Color Sync</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="status" id="status">Loading...</div>

  <div class="preview-row">
    <div class="swatch" id="swatchDetected" title="Detected"></div>
    <div class="swatch" id="swatchFinal" title="After adjustments"></div>
    <div class="swatch-labels">Detected&nbsp;→&nbsp;Applied</div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" id="modeGlobal">Global</div>
    <div class="mode-tab" id="modeSite">This Site</div>
  </div>
  <div class="site-name" id="siteName"></div>
  <div class="site-override-badge" id="overrideBadge"></div>

  <div class="browser-block">
    <div class="browser-row">
      <span class="browser-label">Browser</span>
      <select id="browserSelect">
        <option value="">Choose Browser</option>
        <option value="brave">Brave</option>
        <option value="chrome">Chrome</option>
        <option value="edge">Edge</option>
      </select>
    </div>
    <div class="browser-status warning" id="browserStatus">Browser not selected</div>
  </div>

  <div class="adjust-block">
    <div class="adjust-row">
      <div class="adjust-label">
        <span>Hue</span>
        <span class="adjust-value" id="hueValue">0°</span>
      </div>
      <input type="range" id="hue" min="-180" max="180" value="0" step="1">
    </div>
    <div class="adjust-row">
      <div class="adjust-label">
        <span>Saturation</span>
        <span class="adjust-value" id="satValue">0</span>
      </div>
      <input type="range" id="saturation" min="-100" max="100" value="0" step="1">
    </div>
    <div class="adjust-row">
      <div class="adjust-label">
        <span>Black ← → White</span>
        <span class="adjust-value" id="brightValue">0</span>
      </div>
      <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
    </div>
    <div class="btn-row">
      <button class="reset-btn" id="resetAdjust">Reset</button>
      <button class="reset-btn" id="clearSiteOverride" style="display:none;">Clear site override</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
